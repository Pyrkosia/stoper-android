name: Budowanie APK Androida

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Generowanie czystego pliku Manifestu na serwerze
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com">

            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

            <application
                android:allowBackup="true"
                android:label="Stoper ESP32">
                
                <activity
                    android:name="com.example.stoperimpulsow.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Konfiguracja Javy (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Uruchomienie bezpiecznego budowania z Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        arguments: assembleDebug
        cache-disabled: true

    - name: Udostępnienie gotowego pliku APK do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Aplikacja-Stoper-Instalka
        path: app/build/outputs/apk/debug/app-debug.apk
