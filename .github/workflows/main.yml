name: Budowanie APK Androida

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Automatyczna naprawa adresu w manifeście na serwerze
      run: |
        sed -i 's|http://android.com|http://android.com|g' app/src/main/AndroidManifest.xml

    - name: Konfiguracja Javy (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Uruchomienie bezpiecznego budowania z Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        arguments: assembleDebug
        cache-disabled: true

    - name: Udostępnienie gotowego pliku APK do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Aplikacja-Stoper-Instalka
        path: app/build/outputs/apk/debug/app-debug.apk
