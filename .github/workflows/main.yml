name: Budowanie APK Androida

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Pozwala uruchomić kompilację ręcznie przyciskiem

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Javy (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Pobranie i konfiguracja narzędzia Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Kompilacja pliku APK (Debug)
      run: ./gradlew assembleDebug

    - name: Udostępnienie gotowego pliku APK do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Aplikacja-Stoper-Instalka
        path: app/build/outputs/apk/debug/app-debug.apk
